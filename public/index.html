<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yaratık Takip</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main>
    <section id="login" class="card login-card">
      <h1>Yaratık Takip</h1>
      <p>Giriş yap</p>
      <input id="username" placeholder="Kullanıcı adı" autocomplete="username" />
      <input id="password" placeholder="Parola" type="password" autocomplete="current-password" />
      <button id="loginBtn">Giriş</button>
      <small id="loginError"></small>
    </section>

    <section id="app" class="hidden">
      <header class="topbar">
        <div>
          <h1>Yaratık Takip</h1>
          <p>Giriş yapan: <strong id="currentUser"></strong></p>
        </div>
        <button id="logoutBtn" class="ghost">Çıkış</button>
      </header>

      <nav class="tabs">
        <button id="listTab" class="tab active">Liste</button>
        <button id="usersTab" class="tab hidden">Kullanıcılar</button>
        <button id="onlineTab" class="tab hidden">Online</button>
        <button id="questTab" class="tab">Binek Quest</button>
        <button id="reservationTab" class="tab">Quest Rezervasyon</button>
      </nav>

      <section id="listPage">
        <section class="card add-card">
          <h2>Yeni yaratık ekle</h2>
          <div class="row">
            <input id="newCreature" placeholder="Yaratık adı" />
            <button id="addBtn">Ekle</button>
          </div>
        </section>

        <section class="card">
          <h2>Liste</h2>
          <div id="creatureList"></div>
        </section>
      </section>

      <section id="usersPage" class="hidden">
        <section id="accountCard" class="card hidden">
          <h2>Hesap oluştur</h2>
          <div class="row">
            <input id="newAccountName" placeholder="İsim" />
            <input id="newAccountUsername" placeholder="Kullanıcı adı" />
            <input id="newAccountPassword" placeholder="Parola" type="password" />
            <label class="check-row"><input id="newAccountAdmin" type="checkbox" /> Yetkili</label>
            <button id="createAccountBtn">Oluştur</button>
          </div>
          <small id="accountMessage"></small>
          <h2 class="section-subtitle">Kullanıcılar</h2>
          <div id="accountList" class="mini-list"></div>
        </section>
      </section>

      <section id="onlinePage" class="card hidden">
        <h2>Online kullanıcılar</h2>
        <div id="onlineList" class="mini-list"></div>
      </section>

      <section id="questPage" class="card hidden">
        <h2>Binek tame quest</h2>
        <p class="muted">Salıdan salıya otomatik sıfırlanır.</p>
        <button id="resetQuestBtn" class="danger small hidden">Binek Quest Sıfırla</button>
        <div id="questList" class="quest-list"></div>
      </section>

      <section id="reservationPage" class="card hidden">
        <h2>Quest rezervasyon</h2>
        <p class="muted">Önümüzdeki hafta için kim hangi şehirden başlayacak.</p>
        <p id="reservationWeek" class="muted"></p>
        <div id="reservationList" class="quest-list"></div>
      </section>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
